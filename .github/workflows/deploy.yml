name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: worker
          command: deploy
          secrets: |
            GROQ_API_KEY
            FISH_API_KEY
            API_PROXY_KEY
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FISH_API_KEY: ${{ secrets.FISH_API_KEY }}
          API_PROXY_KEY: ${{ secrets.API_PROXY_KEY }}

      - name: Deploy Frontend to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy frontend --project-name=voice-chat-clone
