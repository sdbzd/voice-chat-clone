<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语音克隆对话</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #252540;
    --primary: #6c5ce7;
    --primary-hover: #7f71ee;
    --text: #e0e0f0;
    --text-dim: #8888a0;
    --user-msg: #2d2d50;
    --bot-msg: #1e1e38;
    --green: #00d2a0;
    --red: #ff6b6b;
    --yellow: #ffd93d;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 16px 20px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 span { background: linear-gradient(135deg,var(--primary),var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--surface2);
  }
  .status-badge .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .status-badge .dot.idle { background: var(--text-dim); }
  .status-badge .dot.ready { background: var(--green); }
  .status-badge .dot.error { background: var(--red); }
  .status-badge .dot.cloning { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── Chat Messages ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    position: relative;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end;
    background: var(--user-msg);
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bot-msg);
    border-bottom-left-radius: 4px;
  }
  .msg.bot.clone { border-left: 3px solid var(--primary); }
  .msg .sender {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .msg .time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    text-align: right;
  }
  .msg .audio-play {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--surface2);
    cursor: pointer;
    font-size: 12px;
    border: none;
    color: var(--text);
    transition: background 0.2s;
  }
  .msg .audio-play:hover { background: var(--primary); }
  .msg .audio-play.playing { background: var(--primary); }

  .cloning-notice {
    align-self: center;
    background: var(--surface2);
    border: 1px solid rgba(255,217,61,0.3);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  .cloning-notice .calibration-text {
    display: block;
    margin: 8px 0;
    padding: 8px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 13px;
    color: var(--yellow);
    cursor: pointer;
    transition: background 0.2s;
  }
  .cloning-notice .calibration-text:hover { background: var(--surface); }

  /* ── Input Bar ── */
  .input-bar {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .btn {
    border: none;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 20px;
  }
  .btn-record {
    background: var(--primary);
    color: white;
  }
  .btn-record:hover { background: var(--primary-hover); transform: scale(1.05); }
  .btn-record:active { transform: scale(0.95); }
  .btn-record.recording {
    background: var(--red);
    animation: recPulse 0.8s infinite;
  }
  @keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.5); } 50% { box-shadow: 0 0 0 12px rgba(255,107,107,0); } }

  .btn-upload {
    background: var(--surface2);
    color: var(--text);
  }
  .btn-upload:hover { background: var(--primary-hover); }

  .input-bar .info {
    flex: 1;
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ── Settings Panel ── */
  .settings {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: none;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .settings.open { display: flex; }
  .settings-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  .settings-row label { color: var(--text-dim); min-width: 80px; }
  .settings-row select, .settings-row input {
    flex: 1;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
  }
  .settings-toggle {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    transition: color 0.2s;
  }
  .settings-toggle:hover { color: var(--text); }

  /* ── Calibration Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    padding: 24px;
    width: 90%;
    max-width: 480px;
    text-align: center;
  }
  .modal h3 { margin-bottom: 12px; }
  .modal p { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
  .modal .calibration-box {
    background: var(--bg);
    border-radius: 8px;
    padding: 16px;
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 16px;
    text-align: left;
  }
  .modal .btn-primary {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: white;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  .modal .btn-primary:hover { background: var(--primary-hover); }
  .modal .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .msg { max-width: 90%; }
    .header h1 { font-size: 15px; }
    .input-bar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎤 <span>语音克隆对话</span></h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="status-badge">
      <span class="dot idle" id="statusDot"></span>
      <span id="statusText">初始化</span>
    </div>
    <button class="settings-toggle" id="settingsToggle" title="设置">⚙️</button>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="msg bot" style="max-width:90%;">
    <div class="sender">🤖 系统</div>
    你好！我是语音克隆助手。<br><br>
    🎙️ 点击麦克风按钮开始说话<br>
    📤 也可上传音频文件来克隆声音<br><br>
    <span style="color:var(--text-dim);font-size:13px;">
      首次对话会自动用你的声音克隆。如果效果不理想，我会提示你读一段校准文本。
    </span>
  </div>
</div>

<div class="input-bar">
  <button class="btn btn-record" id="recordBtn" title="按住录音">🎤</button>
  <button class="btn btn-upload" id="uploadBtn" title="上传音频克隆">📤</button>
  <div class="info" id="infoText">点击🎤开始对话</div>
</div>

<div class="settings" id="settingsPanel">
  <div class="settings-row">
    <label>LLM 模型</label>
    <select id="chatModelSelect">
      <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
      <option value="llama-3.1-8b-instant">Llama 3.1 8B (快)</option>
      <option value="qwen/qwen3-32b">Qwen3 32B</option>
      <option value="gemma2-9b-it">Gemma2 9B</option>
      <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
    </select>
  </div>
  <div class="settings-row">
    <label>LLM 模型</label>
    <input id="voiceIdDisplay" readonly placeholder="尚未克隆" style="color:var(--text-dim);">
  </div>
</div>

<!-- 校准弹窗 -->
<div class="modal-overlay" id="calibrationModal">
  <div class="modal">
    <h3>📝 语音校准</h3>
    <p>克隆效果不够理想，请用自然语调读一遍下面的文字：</p>
    <div class="calibration-box" id="calibrationText">
      今天天气真不错，阳光明媚，微风习习。我正在测试语音克隆的效果，希望这个系统能够准确还原我的声音，让我用自然的方式和AI对话。
    </div>
    <button class="btn-primary" id="startCalibrationBtn">🎙️ 开始朗读</button>
    <br><br>
    <button class="btn-primary" id="uploadCalibrationBtn" style="background:var(--surface2);">📤 上传录音替代</button>
  </div>
</div>

<input type="file" id="audioFileInput" accept="audio/*" style="display:none">

<script src="app.js"></script>
</body>
</html>
